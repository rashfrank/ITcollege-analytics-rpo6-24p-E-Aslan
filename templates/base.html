<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитика колледжа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1a237e;">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'analytics:dashboard' %}">
            <i class="fa-solid fa-graduation-cap me-2"></i>Аналитика ИТК
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'analytics:dashboard' %}"><i class="fa-solid fa-chart-line"></i> Дашборд</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'analytics:review_list' %}"><i class="fa-solid fa-star"></i> Отзывы</a>
                </li>
            </ul>
            <a href="{% url 'analytics:logout' %}" class="btn btn-danger btn-sm">
                <i class="fa-solid fa-right-from-bracket"></i> Выход
            </a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
